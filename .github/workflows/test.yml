name: 'build-test'
on: # rebuild any PRs and main branch changes
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - 'releases/*'

jobs:
  build: # make sure build/ci work properly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1
      - name: Set Node.js 20.x
        uses: actions/setup-node@v4.0.0
        with:
          node-version: 20.x
      - run: |
          npm install
      - run: |
          npm run all
